name: "Build and Publish OpenImpala GPU Wheels (CUDA)"

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build_gpu_wheels:
    name: Build CUDA GPU wheels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # For release events, GITHUB_REF_NAME is the tag (e.g. v4.0.2).
          # For workflow_dispatch, fall back to git describe.
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(git describe --tags --abbrev=0 | sed 's/^v//')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.16.5

      # Cache the compiled GPU dependencies (HDF5, libtiff, HYPRE+CUDA, AMReX+CUDA)
      # These take ~15-20 minutes to build from source with CUDA support.
      - name: Cache native GPU dependencies
        uses: actions/cache@v4
        with:
          path: .cibw-deps-cache
          key: cibw-deps-gpu-cuda12.6-manylinux_2_34-x86_64-hdf5_1.14.6-tiff_4.6.0-hypre_2.31.0-amrex_25.03-gcc13-nvtx3.1.1-arch75-80-quotefix-v10

      - name: Build GPU wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*musllinux* *i686*"
          CIBW_ARCHS_LINUX: "x86_64"

          # Use NVIDIA's CUDA-enabled manylinux image (CUDA 12.6, AlmaLinux 8)
          # This provides nvcc, CUDA runtime, and cuBLAS/cuSPARSE out of the box.
          CIBW_MANYLINUX_X86_64_IMAGE: sameli/manylinux_2_34_x86_64_cuda_12.6

          # Build all dependencies with CUDA support.
          # HDF5 and libtiff are CPU-only (no GPU path needed).
          # HYPRE is built with --with-cuda for GPU-accelerated solves.
          # AMReX is built with -DAMReX_GPU_BACKEND=CUDA for device kernels.
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y epel-release &&
            dnf --enablerepo=crb install -y
            openmpi-devel gcc-gfortran gcc-c++ wget git
            zlib-devel libjpeg-turbo-devel python3-pip
            gcc-toolset-13 gcc-toolset-13-gcc gcc-toolset-13-gcc-c++
            gcc-toolset-13-gcc-gfortran &&
            pip3 install "cmake>=3.28,<4" &&
            export PATH=/opt/rh/gcc-toolset-13/root/usr/bin:/usr/lib64/openmpi/bin:/usr/local/cuda/bin:$PATH &&
            export CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc &&
            export CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++ &&
            export FC=/opt/rh/gcc-toolset-13/root/usr/bin/gfortran &&
            export CUDA_HOME=/usr/local/cuda &&
            if [ -f /project/.cibw-deps-cache/deps.tar.gz ]; then
            echo "=== Restoring cached GPU dependencies ===" &&
            tar xzf /project/.cibw-deps-cache/deps.tar.gz -C / ;
            else
            echo "=== Building GPU dependencies from source ===" &&
            wget -q https://github.com/HDFGroup/hdf5/releases/download/hdf5_1.14.6/hdf5-1.14.6.tar.gz &&
            tar xzf hdf5-1.14.6.tar.gz &&
            cd hdf5-1.14.6 &&
            CC=mpicc CXX=mpicxx ./configure
            --prefix=/usr/local
            --enable-parallel
            --enable-cxx
            --enable-unsupported
            --disable-shared
            --with-pic &&
            make -j$(nproc) &&
            make install &&
            cd .. &&
            wget -q https://download.osgeo.org/libtiff/tiff-4.6.0.tar.gz &&
            tar xzf tiff-4.6.0.tar.gz &&
            cd tiff-4.6.0 &&
            cmake -S . -B build
            -DCMAKE_INSTALL_PREFIX=/usr/local
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=OFF
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON &&
            cmake --build build -j$(nproc) &&
            cmake --install build &&
            cd .. &&
            wget -q https://github.com/hypre-space/hypre/archive/v2.31.0.tar.gz &&
            tar xzf v2.31.0.tar.gz &&
            cd hypre-2.31.0/src &&
            ./configure --prefix=/usr/local --with-MPI --with-cuda
            --with-cuda-home=/usr/local/cuda --enable-shared=no
            CC=mpicc CXX=mpicxx FC=mpif90
            CFLAGS="-O2 -fPIC" CXXFLAGS="-O2 -fPIC" FFLAGS="-O2 -fPIC"
            CUDA_HOME=/usr/local/cuda
            CUDAFLAGS="-allow-unsupported-compiler" &&
            make -j$(nproc) &&
            make install &&
            cd ../.. &&
            wget -q https://github.com/NVIDIA/NVTX/archive/refs/tags/v3.1.1.tar.gz -O nvtx.tar.gz &&
            tar xzf nvtx.tar.gz &&
            mkdir -p /usr/local/cuda/include/nvtx3 /usr/local/include/nvtx3 &&
            cp -rf NVTX-3.1.1/c/include/nvtx3/. /usr/local/cuda/include/nvtx3/ &&
            cp -rf NVTX-3.1.1/c/include/nvtx3/. /usr/local/include/nvtx3/ &&
            git clone --depth 1 --branch 25.03 https://github.com/AMReX-Codes/amrex.git /tmp/amrex &&
            sed -i 's|CUDA::nvToolsExt|CUDA::nvtx3|g' /tmp/amrex/Tools/CMake/AMReXParallelBackends.cmake &&
            sed -i 's|@AMREX_CUDA_ARCHS@|75;80|g' /tmp/amrex/Tools/CMake/AMReXConfig.cmake.in &&
            cmake -S /tmp/amrex -B /tmp/amrex/build
            -DCMAKE_INSTALL_PREFIX=/usr/local
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=OFF
            -DAMReX_MPI=ON
            -DAMReX_OMP=ON
            -DAMReX_SPACEDIM=3
            -DAMReX_FORTRAN=ON
            -DAMReX_PARTICLES=OFF
            -DAMReX_TINY_PROFILE=ON
            -DAMReX_GPU_BACKEND=CUDA
            '-DAMReX_CUDA_ARCH=75;80'
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
            '-DCMAKE_CUDA_ARCHITECTURES=75-real;80-real;90-virtual'
            -DCMAKE_CUDA_HOST_COMPILER=/opt/rh/gcc-toolset-13/root/usr/bin/g++ &&
            cmake --build /tmp/amrex/build -j$(nproc) &&
            cmake --install /tmp/amrex/build &&
            strip --strip-debug /usr/local/lib/libamrex_3d.a /usr/local/lib/libHYPRE.a /usr/local/lib/libhdf5*.a /usr/local/lib/libtiff.a 2>/dev/null || true &&
            mkdir -p /project/.cibw-deps-cache &&
            tar czf /project/.cibw-deps-cache/deps.tar.gz /usr/local ;
            fi &&
            echo "=== Patching installed AMReXConfig.cmake (runs on cache hit AND miss) ===" &&
            sed -i 's|set(AMREX_CUDA_ARCHS  CACHE INTERNAL|set(AMREX_CUDA_ARCHS "75;80" CACHE INTERNAL|' /usr/local/lib/cmake/AMReX/AMReXConfig.cmake &&
            sed -i 's|CUDA_ARCHITECTURES ${AMREX_CUDA_ARCHS})|CUDA_ARCHITECTURES "${AMREX_CUDA_ARCHS}")|' /usr/local/lib/cmake/AMReX/AMReXConfig.cmake &&
            grep -n 'AMREX_CUDA_ARCHS' /usr/local/lib/cmake/AMReX/AMReXConfig.cmake

          # Rename the package to openimpala-cuda and uncomment the nvidia-*-cu12
          # runtime deps (kept commented in pyproject.toml so they don't pollute
          # the CPU wheel). auditwheel --exclude drops the CUDA .so's from the
          # wheel payload, so without these PyPI deps the wheel breaks on any
          # machine that doesn't already have the CUDA toolkit installed.
          # The import name stays 'openimpala' — only the PyPI distribution name changes.
          CIBW_BEFORE_BUILD: >
            pip install "cmake>=3.28,<4" &&
            sed -i 's/^name = "openimpala"/name = "openimpala-cuda"/' /project/pyproject.toml &&
            sed -i 's/^    #"nvidia-/    "nvidia-/' /project/pyproject.toml

          # Point to MPI, CUDA, and our compiled GPU dependencies.
          CIBW_ENVIRONMENT_LINUX: >
            PATH="/opt/rh/gcc-toolset-13/root/usr/bin:/usr/lib64/openmpi/bin:/usr/local/cuda/bin:$PATH"
            CC="/opt/rh/gcc-toolset-13/root/usr/bin/gcc"
            CXX="/opt/rh/gcc-toolset-13/root/usr/bin/g++"
            FC="/opt/rh/gcc-toolset-13/root/usr/bin/gfortran"
            CUDA_HOME="/usr/local/cuda"
            CUDAHOSTCXX="/opt/rh/gcc-toolset-13/root/usr/bin/g++"
            CMAKE_C_COMPILER="mpicc"
            CMAKE_CXX_COMPILER="mpicxx"
            CMAKE_PREFIX_PATH="/usr/local"
            CMAKE_GENERATOR="Unix Makefiles"
            CMAKE_ARGS="-DGPU_BACKEND=CUDA '-DCMAKE_CUDA_ARCHITECTURES=75-real;80-real;90-virtual' -DCMAKE_CUDA_HOST_COMPILER=/opt/rh/gcc-toolset-13/root/usr/bin/g++"
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ steps.version.outputs.version }}"

          # Vendor libraries but exclude host-specific MPI, OpenMP, Fortran runtime,
          # and CUDA runtime libraries (users must have CUDA toolkit installed).
          # auditwheel --strip only touches vendored libs, NOT the main extension
          # _core.so where most of the bloat lives. After auditwheel, unpack the
          # wheel, run strip --strip-all on every .so (including _core.so), then
          # repack via `wheel pack` so RECORD hashes regenerate.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            mkdir -p /tmp/repaired &&
            auditwheel repair --strip -w /tmp/repaired {wheel}
            --exclude libmpi.so
            --exclude libmpi.so.12
            --exclude libmpi.so.40
            --exclude libmpi_cxx.so
            --exclude libmpi_cxx.so.1
            --exclude libmpi_cxx.so.40
            --exclude libopen-rte.so
            --exclude libopen-rte.so.40
            --exclude libopen-pal.so
            --exclude libopen-pal.so.40
            --exclude libmpi_mpifh.so
            --exclude libmpi_mpifh.so.40
            --exclude libgomp.so.1
            --exclude libgfortran.so.5
            --exclude libquadmath.so.0
            --exclude libcuda.so
            --exclude libcuda.so.1
            --exclude libcudart.so
            --exclude libcudart.so.12
            --exclude libcublas.so
            --exclude libcublas.so.12
            --exclude libcublasLt.so
            --exclude libcublasLt.so.12
            --exclude libcusparse.so
            --exclude libcusparse.so.12
            --exclude libcurand.so
            --exclude libcurand.so.10
            --exclude libnvJitLink.so
            --exclude libnvJitLink.so.12 &&
            for whl in /tmp/repaired/*.whl; do
              echo "Pre-strip wheel size:" && ls -lh "$whl" &&
              d=$(mktemp -d) &&
              python3 -m wheel unpack --dest "$d" "$whl" &&
              find "$d" -type f \( -name '*.so' -o -name '*.so.*' \) -print -exec strip --strip-all {} + &&
              python3 -m wheel pack --dest-dir {dest_dir} "$d"/*/ &&
              echo "Post-strip wheel size:" && ls -lh {dest_dir}/*.whl &&
              rm -rf "$d" "$whl";
            done

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-gpu
          path: ./wheelhouse/*.whl

  publish_to_pypi:
    name: Publish GPU wheels to PyPI (openimpala-cuda)
    needs: build_gpu_wheels
    runs-on: ubuntu-latest
    # Only publish on release; workflow_dispatch leaves the artifact for manual
    # inspection without touching PyPI.
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: cibw-wheels-gpu
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
